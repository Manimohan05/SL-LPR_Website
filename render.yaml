services:
  - type: web
    name: sl-lpr-website
    runtime: static
    branch: main
    buildCommand: echo "Static site ready"
    staticPublishPath: ./build
    autoDeployTrigger: commit
    headers:
      - path: /*
        name: Strict-Transport-Security
        value: max-age=31536000
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: Content-Security-Policy
        value: default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self' https://formsubmit.co; img-src 'self' data: https:; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'none'; frame-src 'none'; upgrade-insecure-requests
      - path: /*
        name: Cross-Origin-Opener-Policy
        value: same-origin
      - path: /*
        name: Cross-Origin-Resource-Policy
        value: same-site
      - path: /*
        name: Permissions-Policy
        value: camera=(), microphone=(), geolocation=()
